<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mode: Oli</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f0f0d;--paper:#f4f1eb;--muted:#8a8578}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:'DM Mono',monospace;-webkit-font-smoothing:antialiased}
#canvas{display:block;width:100vw;height:100vh;cursor:pointer}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#start-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--paper);transition:opacity .6s ease}
#start-screen.hidden{opacity:0;pointer-events:none}
.wordmark{font-size:clamp(10px,1.1vw,13px);font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);margin-bottom:48px}
.mode-label{font-size:clamp(10px,1vw,12px);font-weight:300;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.game-title{font-family:Georgia,serif;font-style:italic;font-size:clamp(52px,8vw,96px);color:var(--ink);letter-spacing:-.02em;line-height:1}
.start-instruction{font-size:clamp(10px,1vw,12px);font-weight:300;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.level-dots{display:flex;gap:8px;margin-top:48px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--ink);opacity:.15;transition:opacity .3s}
.dot.active{opacity:.7}
#gameover-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--paper);opacity:0;pointer-events:none;transition:opacity .5s ease}
#gameover-screen.visible{opacity:1;pointer-events:all}
.gameover-label{font-size:clamp(9px,.9vw,11px);font-weight:300;letter-spacing:.45em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.gameover-title{font-family:Georgia,serif;font-style:italic;font-size:clamp(42px,6vw,72px);color:var(--ink);letter-spacing:-.02em;margin-bottom:40px;line-height:1}
.divider{width:40px;height:1px;background:var(--ink);opacity:.2;margin-bottom:40px}
.identity-block{text-align:center;margin-bottom:8px}
.identity-name{font-size:clamp(12px,1.2vw,15px);font-weight:500;letter-spacing:.15em;color:var(--ink);text-transform:uppercase;margin-bottom:8px}
.identity-email{font-size:clamp(10px,1vw,12px);font-weight:300;letter-spacing:.1em;color:var(--muted)}
.identity-role{font-size:clamp(9px,.85vw,11px);font-weight:300;letter-spacing:.2em;color:var(--muted);opacity:.6;margin-top:6px}
.score-result{font-size:clamp(10px,1vw,12px);font-weight:300;letter-spacing:.3em;color:var(--muted);margin:32px 0;text-transform:uppercase}
#score-display{position:absolute;top:32px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:300;letter-spacing:.2em;color:var(--ink);opacity:.6;text-transform:uppercase;transition:opacity .3s}
.restart-btn{font-family:'DM Mono',monospace;font-size:clamp(9px,.9vw,11px);font-weight:400;letter-spacing:.35em;text-transform:uppercase;color:var(--ink);background:transparent;border:1px solid rgba(15,15,13,.25);padding:14px 32px;cursor:pointer;pointer-events:all;transition:all .2s ease;margin-top:8px}
.restart-btn:hover{background:var(--ink);color:var(--paper)}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
<div id="start-screen">
<div class="wordmark">donoghue.co</div>
<div style="text-align:center;margin-bottom:64px"><div class="mode-label">Mode</div><div class="game-title">Oli</div></div>
<div class="start-instruction">tap to begin</div>
<div class="level-dots"><div class="dot active" id="dot-0"></div><div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div><div class="dot" id="dot-3"></div><div class="dot" id="dot-4"></div><div class="dot" id="dot-5"></div></div>
</div>
<div id="score-display" style="opacity:0">Score — <span id="score-val">0</span></div>
<div id="gameover-screen">
<div class="gameover-label">Mode ended</div>
<div class="gameover-title">Oli</div>
<div class="divider"></div>
<div class="identity-block">
<div class="identity-name">Oli Donoghue</div>
<div class="identity-email">oli@donoghue.co</div>
<div class="identity-role">Commercial partnerships &amp; strategy</div>
</div>
<div class="score-result">Distance — <span id="final-score">0</span></div>
<button class="restart-btn" id="restart-btn">Play again</button>
</div>
</div>
<script>
const C={gravity:.38,jumpForce:-7.2,baseSpeed:4.2,speedInc:.0008,gapSize:195,obsInterval:1600,groundH:80};
const LV=[
{name:'prague',sky:['#c4cfd8','#b8c4cf','#d4dce4'],ground:'#6b7c6e',ga:'#5a6b5d',obs:'#4a5a4d',obst:'#3d4d40',bc:['#8a9e8c','#7d9080','#6b7c6e','#9aae9c'],pt:'#a0b4a4',th:0},
{name:'mtb',sky:['#a8c4a0','#b8d4b0','#98b490'],ground:'#5a7a4a',ga:'#4a6a3a',obs:'#3d6030',obst:'#2d5020',bc:['#6a8a5a','#7a9a6a','#5a7a4a','#8aaa7a'],pt:'#90aa80',th:8},
{name:'golf',sky:['#b8d8a0','#c8e8b0','#a8c890'],ground:'#4a8a5a',ga:'#3a7a4a',obs:'#2d6a3d',obst:'#1d5a2d',bc:['#5a9a6a','#6aaa7a','#4a8a5a','#7aba8a'],pt:'#80c090',th:20},
{name:'family',sky:['#d4c8bc','#e0d4c8','#c8bcb0'],ground:'#8a7868',ga:'#7a6858',obs:'#6a5848',obst:'#5a4838',bc:['#9a8878','#aa9888','#8a7868','#baaa98'],pt:'#c0b0a0',th:35},
{name:'snow',sky:['#d8e8f4','#e4f0f8','#ccdce8'],ground:'#d8e8f0',ga:'#c4d8e4',obs:'#a4b8c8',obst:'#90a8b8',bc:['#b8ccd8','#c8dce8','#a8bcc8','#d0e0ec'],pt:'#e0eef4',th:55},
{name:'cargo',sky:['#c8c4b8','#d4d0c4','#bcb8ac'],ground:'#7a8070',ga:'#6a7060',obs:'#5a6050',obst:'#4d5344',bc:['#9a9888','#8a8878','#7a7868','#aaa898'],pt:'#b0ae9e',th:80}
];
let state='start',score=0,frame=0,speed=C.baseSpeed,lvi=0;
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
let W,H,GH;
function resize(){W=innerWidth;H=innerHeight;GH=C.groundH;const pr=devicePixelRatio||1;cv.width=W*pr;cv.height=H*pr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.scale(pr,pr);if(state!=='playing')drawSF();}
addEventListener('resize',resize);
const P={x:0,y:0,vy:0,w:28,h:36,rot:0,trail:[],
reset(){this.x=W*.22;this.y=H*.42;this.vy=0;this.rot=0;this.trail=[];},
jump(){this.vy=C.jumpForce;},
update(){this.vy+=C.gravity;this.vy=Math.max(this.vy,-12);this.y+=this.vy;this.rot=Math.max(-.35,Math.min(.55,this.vy*.055));this.trail.unshift({x:this.x,y:this.y,age:0});if(this.trail.length>8)this.trail.pop();this.trail.forEach(t=>t.age++);},
draw(){const lv=LV[lvi];ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);this.trail.forEach(t=>{ctx.save();ctx.translate(t.x-this.x,t.y-this.y);ctx.globalAlpha=(1-t.age/8)*.12;ctx.fillStyle=lv.pt;ctx.fillRect(-this.w/2+4,-this.h/2+4,this.w-8,this.h-8);ctx.restore();});drawAv(ctx,this.w,this.h,lvi);ctx.restore();},
bounds(){return{x:this.x-this.w/2+4,y:this.y-this.h/2+3,w:this.w-8,h:this.h-6};}
};
function drawAv(c,w,h,l){const hw=w/2,hh=h/2;c.fillStyle='#1a1a18';c.fillRect(-hw+4,-hh+8,w-8,h-14);c.fillStyle='#d4b896';c.fillRect(-hw+7,-hh,w-10,12);c.fillStyle='#2a2420';c.fillRect(-hw+6,-hh-2,w-9,5);c.fillStyle='#1a1a18';c.fillRect(hw-8,-hh+5,2,2);c.fillStyle='#2a2a28';c.fillRect(-hw+5,hh-8,7,6);c.fillRect(-hw+14,hh-8,7,6);
if(l===1){c.fillStyle='#3a7a3a';c.fillRect(-hw+5,-hh-4,w-7,7);}
else if(l===2){c.fillStyle='#f0e8d0';c.fillRect(-hw+5,-hh-4,w-8,5);c.fillRect(hw-5,-hh-2,6,3);}
else if(l===3){c.strokeStyle='#8a7060';c.lineWidth=1.5;c.beginPath();c.moveTo(hw-4,hh-4);c.lineTo(hw+14,hh-8);c.stroke();c.fillStyle='#c8a878';c.fillRect(hw+10,hh-14,10,8);c.fillRect(hw+14,hh-18,8,6);}
else if(l===4){c.fillStyle='#c04040';c.fillRect(-hw+5,-hh-5,w-8,7);c.fillStyle='#d0c080';c.fillRect(hw-10,-hh+3,6,4);}
else if(l===5){c.fillStyle='#4a4a48';c.fillRect(hw-6,-hh+14,3,8);c.fillRect(hw-8,-hh+12,7,2);}
}
let obs=[],lot=0;
function spawnO(){const lv=LV[lvi];obs.push({x:W+40,gY:H*.22+Math.random()*(H*.45),gS:C.gapSize+(score>40?0:20),w:42,passed:false});}
function updO(){const now=Date.now();if(now-lot>C.obsInterval){spawnO();lot=now;}obs.forEach(o=>o.x-=speed);obs=obs.filter(o=>o.x>-100);obs.forEach(o=>{if(!o.passed&&o.x<P.x){o.passed=true;score++;document.getElementById('score-val').textContent=score;chkLv();}});}
function drawO(){const lv=LV[lvi];obs.forEach(o=>{const tH=o.gY-o.gS/2,bY=o.gY+o.gS/2;ctx.fillStyle=lv.obs;ctx.fillRect(o.x-o.w/2,0,o.w,tH);ctx.fillStyle=lv.obst;ctx.fillRect(o.x-o.w/2-4,tH-10,o.w+8,10);ctx.fillStyle=lv.obs;ctx.fillRect(o.x-o.w/2,bY,o.w,H-bY-GH);ctx.fillStyle=lv.obst;ctx.fillRect(o.x-o.w/2-4,bY,o.w+8,10);});}
let bg=[],bgo=0;
function initBG(){bg=[];const lv=LV[lvi];for(let i=0;i<12;i++)bg.push({x:Math.random()*W,h:30+Math.random()*90,w:18+Math.random()*35,color:lv.bc[Math.floor(Math.random()*lv.bc.length)],speed:.3+Math.random()*.5});}
function drawBG(){const lv=LV[lvi];const g=ctx.createLinearGradient(0,0,0,H*.75);g.addColorStop(0,lv.sky[0]);g.addColorStop(.5,lv.sky[1]);g.addColorStop(1,lv.sky[2]);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);bg.forEach(b=>{ctx.fillStyle=b.color;ctx.fillRect(b.x-b.w/2,H-GH-b.h,b.w,b.h);});if(lvi===4){ctx.fillStyle='rgba(255,255,255,.5)';for(let i=0;i<25;i++)ctx.fillRect((bgo*1.5+i*47)%W,(bgo*.8+i*83)%(H*.8),2,2);}ctx.fillStyle=lv.ground;ctx.fillRect(0,H-GH,W,GH);ctx.fillStyle=lv.ga;ctx.fillRect(0,H-GH,W,4);}
function updBG(){bgo+=speed*.3;bg.forEach(b=>{b.x-=b.speed*speed*.18;if(b.x<-b.w){const lv=LV[lvi];b.x=W+b.w;b.color=lv.bc[Math.floor(Math.random()*lv.bc.length)];}});}
function chkLv(){for(let i=LV.length-1;i>=0;i--)if(score>=LV[i].th&&lvi!==i&&i>lvi){lvi=i;initBG();document.getElementById('dot-'+lvi).classList.add('active');}}
function chkCol(){const p=P.bounds();if(P.y+P.h/2>H-GH||P.y-P.h/2<0)return true;for(const o of obs){const tH=o.gY-o.gS/2,bY=o.gY+o.gS/2,ox=o.x-o.w/2-4,ow=o.w+8;if(p.x<ox+ow&&p.x+p.w>ox&&(p.y<tH||p.y+p.h>bY))return true;}return false;}
let lt=0;
function loop(ts){requestAnimationFrame(loop);lt=ts;if(state!=='playing'){if(state==='start')drawSF();return;}speed=C.baseSpeed+score*C.speedInc;frame++;updBG();updO();P.update();if(chkCol()){die();return;}ctx.clearRect(0,0,W,H);drawBG();drawO();P.draw();}
function drawSF(){ctx.clearRect(0,0,W,H);const lv=LV[0];const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,lv.sky[0]);g.addColorStop(1,lv.sky[2]);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle=lv.ground;ctx.fillRect(0,H-GH,W,GH);ctx.fillStyle=lv.ga;ctx.fillRect(0,H-GH,W,4);}
function startGame(){state='playing';score=0;frame=0;speed=C.baseSpeed;lvi=0;obs=[];lot=Date.now()+1200;bgo=0;document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));document.getElementById('dot-0').classList.add('active');P.reset();initBG();document.getElementById('start-screen').classList.add('hidden');document.getElementById('gameover-screen').classList.remove('visible');document.getElementById('score-display').style.opacity='.6';document.getElementById('score-val').textContent='0';}
function die(){state='dead';document.getElementById('final-score').textContent=score;document.getElementById('score-display').style.opacity='0';setTimeout(()=>document.getElementById('gameover-screen').classList.add('visible'),300);}
function inp(){if(state==='start')startGame();else if(state==='playing')P.jump();}
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();inp();}});
cv.addEventListener('click',inp);
cv.addEventListener('touchstart',e=>{e.preventDefault();inp();},{passive:false});
document.getElementById('restart-btn').addEventListener('click',e=>{e.stopPropagation();startGame();requestAnimationFrame(loop);});
resize();drawSF();requestAnimationFrame(loop);
</script>
</body>
</html>
