<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mode: Oli</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f0f0d;--paper:#f4f1eb;--muted:#8a8578}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:'DM Mono',monospace;-webkit-font-smoothing:antialiased}
#cv{display:block;width:100vw;height:100vh;cursor:pointer}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#ss{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--paper);transition:opacity .6s ease}
#ss.h{opacity:0;pointer-events:none}
.wm{font-size:clamp(10px,1.1vw,13px);font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);margin-bottom:48px}
.ml{font-size:clamp(10px,1vw,12px);font-weight:300;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.gt{font-family:Georgia,serif;font-style:italic;font-size:clamp(52px,8vw,96px);color:var(--ink);letter-spacing:-.02em;line-height:1}
.si{font-size:clamp(10px,1vw,12px);font-weight:300;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);animation:pulse 2.4s ease-in-out infinite;margin-top:32px}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.ld{display:flex;gap:8px;margin-top:40px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--ink);opacity:.15;transition:opacity .3s}
.dot.a{opacity:.7}
#gs{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--paper);opacity:0;pointer-events:none;transition:opacity .5s ease}
#gs.v{opacity:1;pointer-events:all}
.gl{font-size:clamp(9px,.9vw,11px);font-weight:300;letter-spacing:.45em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.gtt{font-family:Georgia,serif;font-style:italic;font-size:clamp(42px,6vw,72px);color:var(--ink);letter-spacing:-.02em;margin-bottom:40px;line-height:1}
.dv{width:40px;height:1px;background:var(--ink);opacity:.2;margin-bottom:40px}
.ib{text-align:center;margin-bottom:8px}
.in{font-size:clamp(12px,1.2vw,15px);font-weight:500;letter-spacing:.15em;color:var(--ink);text-transform:uppercase;margin-bottom:8px}
.ie{font-size:clamp(10px,1vw,12px);font-weight:300;letter-spacing:.1em;color:var(--muted)}
.ir{font-size:clamp(9px,.85vw,11px);font-weight:300;letter-spacing:.2em;color:var(--muted);opacity:.6;margin-top:6px}
.sr{font-size:clamp(10px,1vw,12px);font-weight:300;letter-spacing:.3em;color:var(--muted);margin:32px 0;text-transform:uppercase}
#sd{position:absolute;top:32px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:300;letter-spacing:.2em;color:var(--ink);opacity:.6;text-transform:uppercase;transition:opacity .3s}
.rb{font-family:'DM Mono',monospace;font-size:clamp(9px,.9vw,11px);font-weight:400;letter-spacing:.35em;text-transform:uppercase;color:var(--ink);background:transparent;border:1px solid rgba(15,15,13,.25);padding:14px 32px;cursor:pointer;pointer-events:all;transition:all .2s ease;margin-top:8px}
.rb:hover{background:var(--ink);color:var(--paper)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="ui">
  <div id="ss">
    <div class="wm">donoghue.co</div>
    <div style="text-align:center"><div class="ml">Mode</div><div class="gt">Oli</div></div>
    <div class="si">tap to run</div>
    <div class="ld">
      <div class="dot a" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div><div class="dot" id="d4"></div><div class="dot" id="d5"></div>
    </div>
  </div>
  <div id="sd" style="opacity:0">Score — <span id="sv">0</span></div>
  <div id="gs">
    <div class="gl">Mode ended</div>
    <div class="gtt">Oli</div>
    <div class="dv"></div>
    <div class="ib">
      <div class="in">Oli Donoghue</div>
      <div class="ie">oli@donoghue.co</div>
      <div class="ir">Commercial partnerships &amp; strategy</div>
    </div>
    <div class="sr">Distance — <span id="fs">0</span></div>
    <button class="rb" id="rb">Play again</button>
  </div>
</div>
<script>
const LV=[
  {n:'prague',sky:['#c4cfd8','#b8c4cf','#d4dce4'],gr:'#6b7c6e',ga:'#5a6b5d',ob:'#4a5a4d',ot:'#3d4d40',pt:'#7a9a7d',bc:['#8a9e8c','#7d9080','#6b7c6e','#9aae9c'],th:0},
  {n:'mtb',sky:['#a8c4a0','#b8d4b0','#98b490'],gr:'#5a7a4a',ga:'#4a6a3a',ob:'#3d6030',ot:'#2d5020',pt:'#4a7a3a',bc:['#6a8a5a','#7a9a6a','#5a7a4a','#8aaa7a'],th:10},
  {n:'golf',sky:['#b8d8a0','#c8e8b0','#a8c890'],gr:'#4a8a5a',ga:'#3a7a4a',ob:'#2d6a3d',ot:'#1d5a2d',pt:'#3a7a4a',bc:['#5a9a6a','#6aaa7a','#4a8a5a','#7aba8a'],th:22},
  {n:'family',sky:['#d4c8bc','#e0d4c8','#c8bcb0'],gr:'#8a7868',ga:'#7a6858',ob:'#6a5848',ot:'#5a4838',pt:'#9a8878',bc:['#9a8878','#aa9888','#8a7868','#baaa98'],th:38},
  {n:'snow',sky:['#d8e8f4','#e4f0f8','#ccdce8'],gr:'#d8e8f0',ga:'#c4d8e4',ob:'#a4b8c8',ot:'#90a8b8',pt:'#b8ccd8',bc:['#b8ccd8','#c8dce8','#a8bcc8','#d0e0ec'],th:58},
  {n:'cargo',sky:['#c8c4b8','#d4d0c4','#bcb8ac'],gr:'#7a8070',ga:'#6a7060',ob:'#5a6050',ot:'#4d5344',pt:'#8a8878',bc:['#9a9888','#8a8878','#7a7868','#aaa898'],th:82}
];

const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H,GY,PR;
const GH=90;
const PW=26,PH=38;
const GRAV=0.72;
const JUMP=-15.5;
const SPEED_START=10;
const SPEED_MAX=22;
const SPEED_INC=0.006;
const MAX_JUMPS=2;

// running distance accumulator for leg animation — tied to world speed
let runDist=0;

let state='start',score=0,speed,lvi,frame,bgo;
let PX,PY,PVY,jumpsLeft,onGround;
let walls,platforms,bg,lastSpawn;

function resize(){
  PR=window.devicePixelRatio||1;
  W=innerWidth; H=innerHeight;
  cv.width=W*PR; cv.height=H*PR;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.scale(PR,PR);
  GY=H-GH;
  if(state!=='playing') drawIdle();
}
addEventListener('resize',resize);

function initGame(){
  state='playing'; score=0; speed=SPEED_START; lvi=0; frame=0; bgo=0; runDist=0;
  PX=W*0.18; PY=GY-PH; PVY=0; jumpsLeft=MAX_JUMPS; onGround=true;
  walls=[]; platforms=[]; bg=[]; lastSpawn=Date.now()+1000;
  initBG();
  document.getElementById('ss').classList.add('h');
  document.getElementById('gs').classList.remove('v');
  document.getElementById('sd').style.opacity='.6';
  document.getElementById('sv').textContent='0';
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('a'));
  document.getElementById('d0').classList.add('a');
}

function initBG(){
  bg=[];
  const lv=LV[lvi];
  for(let i=0;i<16;i++) bg.push({
    x:Math.random()*W*1.4, h:15+Math.random()*65, w:10+Math.random()*28,
    col:lv.bc[Math.floor(Math.random()*lv.bc.length)], spd:0.12+Math.random()*0.3
  });
}

function drawBG(){
  const lv=LV[lvi];
  const g=ctx.createLinearGradient(0,0,0,GY);
  g.addColorStop(0,lv.sky[0]); g.addColorStop(.6,lv.sky[1]); g.addColorStop(1,lv.sky[2]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,GY);
  bg.forEach(b=>{ ctx.fillStyle=b.col; ctx.fillRect(b.x-b.w/2,GY-b.h,b.w,b.h); });
  if(lvi===4){ ctx.fillStyle='rgba(255,255,255,.55)'; for(let i=0;i<22;i++) ctx.fillRect((bgo+i*61)%W,(bgo*.6+i*89)%(GY*.85),2,2); }
  ctx.fillStyle=lv.gr; ctx.fillRect(0,GY,W,GH);
  ctx.fillStyle=lv.ga; ctx.fillRect(0,GY,W,5);
  // ground speed lines — faster = more visible streaks
  if(speed>12){
    const alpha=Math.min(0.18,(speed-12)/40);
    ctx.fillStyle='rgba(0,0,0,'+alpha+')';
    for(let i=0;i<8;i++){
      const sx=(bgo*3+i*120)%W;
      const len=20+speed*2;
      ctx.fillRect(sx,GY+10+i*8,len,1);
    }
  }
  if(lvi===2){ ctx.fillStyle='rgba(0,0,0,.04)'; for(let i=0;i<16;i++){const sx=(bgo*2.2+i*50)%W; ctx.fillRect(sx,GY+5,20,GH-5);} }
}

function updBG(){
  bgo=(bgo+speed*.22)%W;
  bg.forEach(b=>{
    b.x-=b.spd*speed*.14;
    if(b.x<-b.w){ const lv=LV[lvi]; b.x=W+b.w; b.col=lv.bc[Math.floor(Math.random()*lv.bc.length)]; }
  });
}

function spawnNext(){
  const lv=LV[lvi];
  const r=Math.random();
  const platChance=Math.min(0.42,0.08+score*0.009);

  if(r<platChance){
    const pw=65+Math.random()*90;
    const ph=14;
    const py=GY-85-Math.random()*110;
    platforms.push({x:W+50,y:py,w:pw,h:ph,col:lv.pt,top:lv.ot,passed:false});
    if(Math.random()>0.45){
      walls.push({x:W+50+pw+70+Math.random()*50,h:28+Math.random()*38,w:18+Math.random()*14,col:lv.ob,top:lv.ot,passed:false});
    }
  } else if(r<platChance+0.18 && score>4){
    const gap=80+Math.random()*70;
    const wh=45+Math.random()*55;
    const ww=20+Math.random()*12;
    walls.push({x:W+50,h:wh,w:ww,col:lv.ob,top:lv.ot,passed:false});
    walls.push({x:W+50+ww+gap,h:wh+15,w:ww,col:lv.ob,top:lv.ot,passed:false});
  } else {
    const h=score<6 ? 32+Math.random()*28 : 28+Math.random()*70;
    walls.push({x:W+50,h,w:18+Math.random()*16,col:lv.ob,top:lv.ot,passed:false});
  }
}

function updObstacles(){
  const now=Date.now();
  const interval=Math.max(620,1400-score*14);
  if(now-lastSpawn>interval){ spawnNext(); lastSpawn=now; }
  walls.forEach(o=>o.x-=speed);
  platforms.forEach(p=>p.x-=speed);
  walls=walls.filter(o=>o.x>-120);
  platforms=platforms.filter(p=>p.x>-220);
  walls.forEach(o=>{ if(!o.passed&&o.x+o.w/2<PX){ o.passed=true; score++; onScore(); }});
  platforms.forEach(p=>{ if(!p.passed&&p.x+p.w<PX){ p.passed=true; score++; onScore(); }});
}

function onScore(){
  document.getElementById('sv').textContent=score;
  for(let i=LV.length-1;i>=0;i--){
    if(score>=LV[i].th&&lvi!==i&&i>lvi){ lvi=i; initBG(); document.getElementById('d'+lvi).classList.add('a'); break; }
  }
}

function drawObstacles(){
  walls.forEach(o=>{
    ctx.fillStyle=o.col; ctx.fillRect(o.x-o.w/2,GY-o.h,o.w,o.h);
    ctx.fillStyle=o.top; ctx.fillRect(o.x-o.w/2-3,GY-o.h,o.w+6,8);
  });
  platforms.forEach(p=>{
    ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(p.x+4,p.y+p.h,p.w,5);
    ctx.fillStyle=p.col; ctx.fillRect(p.x,p.y,p.w,p.h);
    ctx.fillStyle=p.top; ctx.fillRect(p.x,p.y,p.w,4);
  });
}

function updPlayer(){
  PVY+=GRAV;
  PY+=PVY;
  onGround=false;

  // ground
  if(PY>=GY-PH){ PY=GY-PH; PVY=0; onGround=true; jumpsLeft=MAX_JUMPS; }

  // platforms — land on top
  platforms.forEach(p=>{
    if(PX+PW/2-5>p.x && PX-PW/2+5<p.x+p.w){
      if(PVY>=0 && PY-PVY<=p.y && PY>=p.y){
        PY=p.y; PVY=0; onGround=true; jumpsLeft=MAX_JUMPS;
      }
    }
  });

  if(PY<PH){ PY=PH; PVY=Math.max(0,PVY); }

  // accumulate running distance for leg animation — faster world = faster legs
  if(onGround) runDist+=speed;
}

function drawPlayer(){
  ctx.save();
  ctx.translate(PX,PY);
  const sy=onGround?1:(PVY<-5?1.14:PVY>5?0.9:1);
  const sx=onGround?1:(PVY<-5?0.86:1);
  ctx.scale(sx,sy);
  drawAv(lvi);
  ctx.restore();
}

function drawAv(l){
  const hw=PW/2,hh=PH/2;
  // body
  ctx.fillStyle='#1a1a18'; ctx.fillRect(-hw+3,-hh+10,PW-6,PH-18);
  // head
  ctx.fillStyle='#d4b896'; ctx.fillRect(-hw+6,-hh,PW-8,13);
  // hair
  ctx.fillStyle='#2a2420'; ctx.fillRect(-hw+5,-hh-3,PW-7,6);
  // eye
  ctx.fillStyle='#1a1a18'; ctx.fillRect(hw-9,-hh+5,2,2);
  // LEGS — speed-synced: runDist drives the phase, not frame count
  const legPhase = onGround ? Math.sin(runDist*0.045)*7 : 0;
  const armPhase = onGround ? Math.sin(runDist*0.045+Math.PI)*4 : 0;
  ctx.fillStyle='#2a2a28';
  ctx.fillRect(-hw+3, hh-10+legPhase, 7, 9);
  ctx.fillRect(-hw+13, hh-10-legPhase, 7, 9);
  // arms
  ctx.fillStyle='#1a1a18';
  ctx.fillRect(-hw+3, -hh+18+armPhase, 5, 7);
  ctx.fillRect(hw-8, -hh+18-armPhase, 5, 7);

  // level overlays
  if(l===1){ ctx.fillStyle='#3a7a3a'; ctx.fillRect(-hw+4,-hh-5,PW-5,8); ctx.fillStyle='#2a6a2a'; ctx.fillRect(-hw+3,-hh,3,5); }
  else if(l===2){ ctx.fillStyle='#f0e8d0'; ctx.fillRect(-hw+4,-hh-4,PW-6,6); ctx.fillRect(hw-5,-hh-2,6,3); }
  else if(l===3){ ctx.strokeStyle='#8a7060'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(hw-3,2); ctx.lineTo(hw+16,0); ctx.stroke(); ctx.fillStyle='#c8a878'; ctx.fillRect(hw+12,-8,10,7); ctx.fillRect(hw+15,-13,8,6); ctx.fillRect(hw+14,0,4,5); ctx.fillRect(hw+19,0,4,5); }
  else if(l===4){ ctx.fillStyle='#c04040'; ctx.fillRect(-hw+4,-hh-6,PW-5,8); ctx.fillStyle='#d0c080'; ctx.fillRect(hw-11,-hh+4,6,4); }
  else if(l===5){ ctx.fillStyle='#4a4a48'; ctx.fillRect(hw-5,-hh+14,3,9); ctx.fillRect(hw-7,-hh+13,7,2); }
}

function checkCollision(){
  const px=PX-PW/2+4,py=PY-PH+5,pw=PW-8,ph=PH-8;
  for(const o of walls){
    if(px<o.x-o.w/2+o.w && px+pw>o.x-o.w/2 && py+ph>GY-o.h && py<GY) return true;
  }
  return false;
}

function doJump(){
  if(jumpsLeft>0){
    PVY=JUMP*(jumpsLeft===MAX_JUMPS?1:0.8);
    onGround=false; jumpsLeft--;
  }
}

function handleInput(){
  if(state==='start') initGame();
  else if(state==='playing') doJump();
}

document.addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();handleInput();} });
cv.addEventListener('click',handleInput);
cv.addEventListener('touchstart',e=>{e.preventDefault();handleInput();},{passive:false});
document.getElementById('rb').addEventListener('click',e=>{e.stopPropagation();initGame();});

function drawIdle(){
  if(!W)return;
  ctx.clearRect(0,0,W,H);
  const lv=LV[0];
  const g=ctx.createLinearGradient(0,0,0,GY||H*.85);
  g.addColorStop(0,lv.sky[0]); g.addColorStop(1,lv.sky[2]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle=lv.gr; ctx.fillRect(0,GY||H*.85,W,H);
  ctx.fillStyle=lv.ga; ctx.fillRect(0,GY||H*.85,W,5);
}

function loop(){
  requestAnimationFrame(loop);
  if(state!=='playing'){ if(state==='start') drawIdle(); return; }
  frame++;
  speed=Math.min(SPEED_MAX,SPEED_START+score*SPEED_INC*60);
  updBG(); updObstacles(); updPlayer();
  if(checkCollision()){die();return;}
  ctx.clearRect(0,0,W,H);
  drawBG(); drawObstacles(); drawPlayer();
}

function die(){
  state='dead';
  document.getElementById('fs').textContent=score;
  document.getElementById('sd').style.opacity='0';
  setTimeout(()=>document.getElementById('gs').classList.add('v'),400);
}

resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
