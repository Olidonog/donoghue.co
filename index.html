<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mode: Oli</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#f5f0e8;font-family:'Montserrat',sans-serif}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .container{text-align:center;padding:2rem;max-width:480px;width:100%}
    .label{font-size:.6rem;font-weight:300;letter-spacing:.4em;text-transform:uppercase;color:#9a9080;margin-bottom:.5rem}
    .title{font-family:'Cormorant Garamond',serif;font-size:clamp(4rem,14vw,7rem);font-style:italic;font-weight:300;color:#1a1710;line-height:1;margin-bottom:2.5rem}
    .divider{width:1px;height:40px;background:linear-gradient(to bottom,transparent,#c8a96e,transparent);margin:0 auto 2rem}
    .instructions{margin-bottom:2.5rem}
    .instructions p{font-size:.62rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;color:#7a7060;margin-bottom:.8rem;line-height:1.8}
    .key{display:inline-block;background:rgba(200,169,110,.15);border:1px solid rgba(200,169,110,.4);color:#8a6e3a;padding:.1rem .5rem;font-size:.58rem;letter-spacing:.1em;border-radius:2px}
    .play-btn{display:inline-block;padding:1rem 3.5rem;background:#1a1710;color:#f5f0e8;font-family:'Montserrat',sans-serif;font-size:.62rem;font-weight:300;letter-spacing:.35em;text-transform:uppercase;cursor:pointer;border:none;transition:background .3s,color .3s}
    .play-btn:hover{background:#c8a96e;color:#1a1710}
    .back-link{display:block;margin-top:2rem;font-size:.55rem;font-weight:300;letter-spacing:.3em;text-transform:uppercase;color:#b0a898;text-decoration:none;transition:color .3s}
    .back-link:hover{color:#7a7060}
    .dots{display:flex;justify-content:center;gap:6px;margin-top:3rem}
    .dot{width:4px;height:4px;border-radius:50%;background:#c8a96e;opacity:.3}
    .dot.active{opacity:1}
  </style>
</head>
<body>
  <div class="container">
    <p class="label">Donoghue.co</p>
    <h1 class="title">Oli</h1>
    <div class="divider"></div>
    <div class="instructions">
      <p><span class="key">Tap</span> or <span class="key">Space</span> to jump</p>
      <p><span class="key">Avoid</span> the obstacles</p>
      <p><span class="key">Collect</span> the moments</p>
    </div>
    <button class="play-btn" id="playBtn">Play</button>
    <a href="https://donoghue.co" class="back-link">donoghue.co</a>
    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
  <script>
    document.getElementById('playBtn').addEventListener('click',function(){
      this.textContent='Loading...';
      setTimeout(function(){window.location.href='mode_oli.html'},200);
    });
  </script>
</body>
</html>
