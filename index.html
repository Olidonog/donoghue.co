<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mode: Oli</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@1,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --ink: #0f0f0d;
  --paper: #f4f1eb;
  --muted: #8a8578;
  --accent: #c8a96e;
}

html,body {
  width:100%;height:100%;
  overflow:hidden;
  background:var(--ink);
  -webkit-font-smoothing:antialiased;
  touch-action:none;
}

#canvas {
  display:block;
  width:100vw;height:100vh;
  cursor:pointer;
}

#ui {
  position:fixed;inset:0;
  pointer-events:none;
  z-index:10;
  font-family:'DM Mono',monospace;
}

/* ── START SCREEN ── */
#start {
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--paper);
  transition:opacity 0.8s ease;
}
#start.out { opacity:0; pointer-events:none; }

.wordmark {
  font-size:clamp(9px,1vw,11px);
  font-weight:300;
  letter-spacing:0.4em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:56px;
}

.title-wrap {
  text-align:center;
  margin-bottom:56px;
}

.mode-tag {
  font-size:clamp(9px,0.9vw,11px);
  font-weight:300;
  letter-spacing:0.5em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:8px;
}

.title-oli {
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(72px,10vw,120px);
  font-weight:400;
  color:var(--ink);
  line-height:0.9;
  letter-spacing:-0.02em;
}

.start-hint {
  font-size:clamp(9px,0.9vw,11px);
  font-weight:300;
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--muted);
  animation:pulse 2.4s ease-in-out infinite;
}

@keyframes pulse {
  0%,100%{opacity:0.4}
  50%{opacity:1}
}

.level-pips {
  position:absolute;
  bottom:40px;
  left:50%;transform:translateX(-50%);
  display:flex;gap:8px;
}
.pip {
  width:5px;height:5px;
  border-radius:50%;
  background:var(--muted);
  opacity:0.25;
  transition:opacity 0.4s,background 0.4s;
}
.pip.on { opacity:1; background:var(--ink); }

/* ── SCORE ── */
#score {
  position:absolute;
  top:28px;left:50%;transform:translateX(-50%);
  font-size:11px;font-weight:300;
  letter-spacing:0.25em;text-transform:uppercase;
  color:var(--ink);opacity:0;
  transition:opacity 0.4s;
}

/* ── GAME OVER ── */
#over {
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--paper);
  opacity:0;pointer-events:none;
  transition:opacity 0.6s ease;
}
#over.in { opacity:1; pointer-events:all; }

.over-label {
  font-size:clamp(9px,0.9vw,11px);
  font-weight:300;letter-spacing:0.5em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:8px;
}
.over-name {
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(52px,7vw,88px);
  color:var(--ink);line-height:0.9;
  margin-bottom:32px;
}
.over-rule {
  width:40px;height:1px;
  background:rgba(15,15,13,0.2);
  margin-bottom:32px;
}
.over-id {
  text-align:center;margin-bottom:28px;
}
.over-fullname {
  font-size:clamp(10px,1.1vw,13px);
  font-weight:500;letter-spacing:0.15em;
  text-transform:uppercase;color:var(--ink);
  margin-bottom:6px;
}
.over-email {
  font-size:clamp(9px,1vw,11px);
  font-weight:300;letter-spacing:0.1em;
  color:var(--muted);margin-bottom:4px;
}
.over-role {
  font-size:clamp(8px,0.85vw,10px);
  font-weight:300;letter-spacing:0.2em;
  color:var(--muted);opacity:0.6;
}
.over-dist {
  font-size:clamp(9px,0.9vw,11px);
  font-weight:300;letter-spacing:0.25em;
  text-transform:uppercase;color:var(--muted);
  margin:24px 0;
}
.over-dist span { color:var(--ink);font-weight:400; }

.play-btn {
  font-family:'DM Mono',monospace;
  font-size:clamp(9px,0.9vw,11px);
  font-weight:400;letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--ink);background:transparent;
  border:1px solid rgba(15,15,13,0.25);
  padding:14px 32px;cursor:pointer;
  pointer-events:all;
  transition:all 0.2s ease;
}
.play-btn:hover {
  background:var(--ink);color:var(--paper);
  border-color:var(--ink);
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div id="start">
    <div class="wordmark">donoghue.co</div>
    <div class="title-wrap">
      <div class="mode-tag">Mode</div>
      <div class="title-oli">Oli</div>
    </div>
    <div class="start-hint">tap to begin</div>
    <div class="level-pips">
      <div class="pip on" id="p0"></div>
      <div class="pip" id="p1"></div>
      <div class="pip" id="p2"></div>
      <div class="pip" id="p3"></div>
      <div class="pip" id="p4"></div>
      <div class="pip" id="p5"></div>
    </div>
  </div>

  <div id="score">Distance — <span id="sv">0</span></div>

  <div id="over">
    <div class="over-label">Mode ended</div>
    <div class="over-name">Oli</div>
    <div class="over-rule"></div>
    <div class="over-id">
      <div class="over-fullname">Oli Donoghue</div>
      <div class="over-email">oli@donoghue.co</div>
      <div class="over-role">Commercial partnerships &amp; strategy</div>
    </div>
    <div class="over-dist">Distance — <span id="fs">0</span></div>
    <button class="play-btn" id="rbtn">Play again</button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const CFG = {
  gravity:       0.36,
  jump:         -7.0,
  baseSpeed:     4.0,
  speedInc:      0.0007,
  gap:           190,
  spawnMs:       1650,
  groundH:       72,
  trailLen:      8,
};

// ── LEVELS ──────────────────────────────────────────────────────────────────
const LEVELS = [
  {
    name:'Prague', threshold:0,
    sky:['#bec9d2','#c8d3dc','#d4dde6'],
    fog:'rgba(180,192,202,0.18)',
    ground:'#6b7c6e', gndAccent:'#5a6b5d',
    obs:'#4a5a4d', obsTop:'#3a4a3d',
    bld:['#8a9e8c','#7a8e7e','#9aae9c','#6a7e6c'],
    ptcl:'rgba(160,176,164,0.6)',
    weather:null,
  },
  {
    name:'MTB', threshold:10,
    sky:['#a4c09c','#b4d0ac','#94b08c'],
    fog:'rgba(148,186,136,0.12)',
    ground:'#5a7a4a', gndAccent:'#4a6a3a',
    obs:'#3a6030', obsTop:'#2a5020',
    bld:['#6a8a5a','#7a9a6a','#5a7a4a','#8aaa7a'],
    ptcl:'rgba(144,170,128,0.5)',
    weather:'leaves',
  },
  {
    name:'Golf', threshold:25,
    sky:['#b4d89c','#c4e8ac','#a4c88c'],
    fog:'rgba(164,200,140,0.1)',
    ground:'#4a8a5a', gndAccent:'#3a7a4a',
    obs:'#2a6a3a', obsTop:'#1a5a2a',
    bld:['#5a9a6a','#6aaa7a','#4a8a5a','#7aba8a'],
    ptcl:'rgba(128,192,144,0.5)',
    weather:null,
  },
  {
    name:'Family', threshold:42,
    sky:['#d0c4b8','#dcd0c4','#c4b8ac'],
    fog:'rgba(200,184,168,0.15)',
    ground:'#8a7868', gndAccent:'#7a6858',
    obs:'#6a5848', obsTop:'#5a4838',
    bld:['#9a8878','#aa9888','#8a7868','#baaa98'],
    ptcl:'rgba(192,176,160,0.5)',
    weather:null,
  },
  {
    name:'Snow', threshold:60,
    sky:['#d4e8f4','#e0f0f8','#c8dcea'],
    fog:'rgba(210,230,242,0.2)',
    ground:'#d4e4ee', gndAccent:'#c0d4e2',
    obs:'#a0b8c8', obsTop:'#8ca8b8',
    bld:['#b4ccd8','#c4dce8','#a4bcc8','#ccdce8'],
    ptcl:'rgba(230,240,248,0.8)',
    weather:'snow',
  },
  {
    name:'Cargo', threshold:82,
    sky:['#c4c0b4','#d0ccc0','#b8b4a8'],
    fog:'rgba(188,184,172,0.15)',
    ground:'#7a8070', gndAccent:'#6a7060',
    obs:'#5a6050', obsTop:'#4a5040',
    bld:['#9a9888','#8a8878','#aa9898','#7a7868'],
    ptcl:'rgba(176,172,158,0.5)',
    weather:null,
  },
];

// ── STATE ────────────────────────────────────────────────────────────────────
let state = 'start'; // start | play | dead
let score = 0, frame = 0, speed = CFG.baseSpeed, lvlIdx = 0;
let lastSpawn = 0, particles = [], weather = [], buildings = [];

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H, GH;

// ── PLAYER ───────────────────────────────────────────────────────────────────
const player = {
  x: 0, y: 0, vy: 0,
  w: 28, h: 32,
  trail: [],
  dead: false,

  reset() {
    this.x  = W * 0.22;
    this.y  = H * 0.46;
    this.vy = 0;
    this.trail = [];
    this.dead = false;
  },

  jump() {
    this.vy = CFG.jump;
  },

  update() {
    this.vy += CFG.gravity;
    this.y  += this.vy;
    this.trail.unshift({x:this.x, y:this.y, a:0.18});
    if(this.trail.length > CFG.trailLen) this.trail.pop();
    this.trail.forEach((t,i) => t.a = (1 - i/CFG.trailLen) * 0.12);
  },

  hitbox() {
    return { x:this.x-this.w/2+5, y:this.y-this.h/2+4, w:this.w-10, h:this.h-8 };
  },

  draw(lv) {
    const lvl = LEVELS[lv];
    // Trail
    this.trail.forEach((t,i) => {
      ctx.save();
      ctx.globalAlpha = t.a * (1-i/CFG.trailLen);
      ctx.fillStyle = lvl.ground;
      ctx.fillRect(t.x - this.w/2 + 4, t.y - this.h/2 + 6, this.w-8, this.h-12);
      ctx.restore();
    });
    ctx.save();
    ctx.translate(this.x, this.y);
    // Tilt with velocity
    const tilt = Math.max(-0.4, Math.min(0.3, this.vy * 0.025));
    ctx.rotate(tilt);
    drawAvatar(lv);
    ctx.restore();
  }
};

// ── AVATAR DRAWING ────────────────────────────────────────────────────────────
function drawAvatar(lv) {
  const hw = player.w/2, hh = player.h/2;

  // Body
  ctx.fillStyle = '#1c1c1a';
  ctx.fillRect(-hw+4, -hh+8, player.w-8, player.h-14);

  // Head / skin
  ctx.fillStyle = '#d4b896';
  ctx.fillRect(-hw+7, -hh+1, player.w-10, 11);

  // Hair
  ctx.fillStyle = '#2a2420';
  ctx.fillRect(-hw+6, -hh-1, player.w-8, 5);

  // Eye
  ctx.fillStyle = '#1a1a18';
  ctx.fillRect(hw-8, -hh+5, 2, 2);

  // Legs
  ctx.fillStyle = '#2a2a28';
  ctx.fillRect(-hw+5, hh-8, 7, 7);
  ctx.fillRect(-hw+14, hh-8, 7, 7);

  // Level overlays
  if(lv === 0) {
    // Prague — scarf
    ctx.fillStyle = '#8a6a4a';
    ctx.fillRect(-hw+4, -hh+10, player.w-6, 4);
  } else if(lv === 1) {
    // MTB — helmet
    ctx.fillStyle = '#3a7030';
    ctx.fillRect(-hw+5, -hh-4, player.w-7, 7);
    ctx.fillStyle = '#2a6020';
    ctx.fillRect(-hw+4, -hh, 4, 4);
    // glasses
    ctx.fillStyle = 'rgba(200,220,240,0.7)';
    ctx.fillRect(hw-10, -hh+4, 6, 3);
  } else if(lv === 2) {
    // Golf — cap
    ctx.fillStyle = '#f0e8d0';
    ctx.fillRect(-hw+5, -hh-3, player.w-8, 5);
    ctx.fillRect(hw-5, -hh-2, 6, 3);
  } else if(lv === 3) {
    // Family — casual jacket
    ctx.fillStyle = '#6a8aaa';
    ctx.fillRect(-hw+3, -hh+8, player.w-6, player.h-16);
    // dog lead
    ctx.strokeStyle = '#8a7060';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(hw-3, hh-5);
    ctx.quadraticCurveTo(hw+10, hh+2, hw+18, hh-8);
    ctx.stroke();
    // dog body
    ctx.fillStyle = '#c8a870';
    ctx.fillRect(hw+12, hh-14, 12, 8);
    ctx.fillRect(hw+18, hh-7, 4, 5);
    ctx.fillRect(hw+12, hh-7, 3, 4);
    // dog head
    ctx.fillRect(hw+16, hh-18, 9, 6);
    ctx.fillRect(hw+23, hh-15, 4, 3);
  } else if(lv === 4) {
    // Snow — beanie
    ctx.fillStyle = '#b03030';
    ctx.fillRect(-hw+5, -hh-5, player.w-7, 8);
    ctx.fillStyle = '#d04040';
    ctx.fillRect(-hw+5, -hh-6, player.w-7, 3);
    // goggles
    ctx.fillStyle = '#d4c070';
    ctx.fillRect(hw-11, -hh+3, 7, 4);
    ctx.fillStyle = 'rgba(255,240,160,0.5)';
    ctx.fillRect(hw-10, -hh+4, 5, 2);
  } else if(lv === 5) {
    // Cargo — backpack
    ctx.fillStyle = '#4a4a48';
    ctx.fillRect(-hw, -hh+8, 5, 14);
    ctx.fillStyle = '#3a3a38';
    ctx.fillRect(-hw-1, -hh+10, 4, 10);
    // handlebar hint
    ctx.fillStyle = '#6a6a68';
    ctx.fillRect(hw-6, -hh+14, 4, 8);
    ctx.fillRect(hw-8, -hh+12, 7, 2);
  }
}

// ── OBSTACLES ─────────────────────────────────────────────────────────────────
let obs = [];

function spawnObs() {
  const lv  = LEVELS[lvlIdx];
  const gap = CFG.gap - Math.min(30, score * 0.4);
  const gapY = GH * 0.2 + Math.random() * (H - GH - gap - GH*0.3);
  obs.push({
    x: W + 24,
    gapY, gap,
    w: 44,
    passed: false,
    col: lv.obs,
    top: lv.obsTop,
  });
}

function updateObs() {
  obs.forEach(o => {
    o.x -= speed;
    // Score
    if(!o.passed && o.x + o.w/2 < player.x) {
      o.passed = true;
      score++;
      document.getElementById('sv').textContent = score;
      updateLevel();
    }
  });
  obs = obs.filter(o => o.x > -60);
}

function drawObs() {
  obs.forEach(o => {
    // Top pipe
    ctx.fillStyle = o.col;
    ctx.fillRect(o.x - o.w/2, 0, o.w, o.gapY);
    ctx.fillStyle = o.top;
    ctx.fillRect(o.x - o.w/2 - 3, o.gapY - 12, o.w + 6, 12);
    // Bottom pipe
    const bot = o.gapY + o.gap;
    ctx.fillStyle = o.col;
    ctx.fillRect(o.x - o.w/2, bot, o.w, H - bot - GH);
    ctx.fillStyle = o.top;
    ctx.fillRect(o.x - o.w/2 - 3, bot, o.w + 6, 12);
  });
}

function checkCollisions() {
  const hb = player.hitbox();
  // Ground / ceiling
  if(player.y + player.h/2 > H - GH || player.y - player.h/2 < 0) return true;
  // Obstacles
  for(const o of obs) {
    if(hb.x + hb.w > o.x - o.w/2 && hb.x < o.x + o.w/2) {
      if(hb.y < o.gapY || hb.y + hb.h > o.gapY + o.gap) return true;
    }
  }
  return false;
}

// ── BACKGROUND ────────────────────────────────────────────────────────────────
function initBuildings() {
  buildings = [];
  const lv = LEVELS[lvlIdx];
  for(let i = 0; i < 14; i++) {
    buildings.push({
      x: Math.random() * W * 1.5,
      w: 20 + Math.random() * 40,
      h: 30 + Math.random() * (H * 0.28),
      col: lv.bld[Math.floor(Math.random() * lv.bld.length)],
      layer: Math.random() < 0.5 ? 0 : 1,
    });
  }
  buildings.sort((a,b) => a.layer - b.layer);
}

function drawBackground() {
  const lv = LEVELS[lvlIdx];

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H - GH);
  sky.addColorStop(0,   lv.sky[0]);
  sky.addColorStop(0.5, lv.sky[1]);
  sky.addColorStop(1,   lv.sky[2]);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H - GH);

  // Background buildings (far layer)
  buildings.filter(b => b.layer === 0).forEach(b => {
    ctx.fillStyle = b.col;
    ctx.globalAlpha = 0.35;
    ctx.fillRect(b.x, H - GH - b.h, b.w, b.h);
    ctx.globalAlpha = 1;
  });

  // Mid buildings
  buildings.filter(b => b.layer === 1).forEach(b => {
    ctx.fillStyle = b.col;
    ctx.globalAlpha = 0.6;
    ctx.fillRect(b.x, H - GH - b.h, b.w, b.h);
    ctx.globalAlpha = 1;
  });

  // Scroll buildings
  buildings.forEach(b => {
    b.x -= speed * (b.layer === 0 ? 0.3 : 0.55);
    if(b.x + b.w < 0) {
      b.x = W + 20;
      b.w = 20 + Math.random() * 40;
      b.h = 30 + Math.random() * (H * 0.28);
      const lv2 = LEVELS[lvlIdx];
      b.col = lv2.bld[Math.floor(Math.random() * lv2.bld.length)];
    }
  });

  // Ground
  ctx.fillStyle = lv.ground;
  ctx.fillRect(0, H - GH, W, GH);
  ctx.fillStyle = lv.gndAccent;
  ctx.fillRect(0, H - GH, W, 3);

  // Ground texture lines
  ctx.strokeStyle = lv.gndAccent;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.3;
  for(let x = (frame * speed * 0.5) % 60; x < W; x += 60) {
    ctx.beginPath();
    ctx.moveTo(x, H - GH + 8);
    ctx.lineTo(x + 20, H - GH + 8);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Fog / atmosphere
  const fog = ctx.createLinearGradient(0, H - GH - 60, 0, H - GH);
  fog.addColorStop(0, 'transparent');
  fog.addColorStop(1, lv.fog);
  ctx.fillStyle = fog;
  ctx.fillRect(0, H - GH - 60, W, 60);
}

// ── WEATHER PARTICLES ─────────────────────────────────────────────────────────
function initWeather() {
  weather = [];
  const lv = LEVELS[lvlIdx];
  if(!lv.weather) return;
  const n = lv.weather === 'snow' ? 60 : 30;
  for(let i = 0; i < n; i++) {
    spawnWeatherPtcl(true);
  }
}

function spawnWeatherPtcl(init) {
  const lv = LEVELS[lvlIdx];
  if(!lv.weather) return;
  weather.push({
    x: Math.random() * W,
    y: init ? Math.random() * H : -10,
    vx: lv.weather === 'snow' ? (Math.random()-0.5)*0.8 : -speed*0.6,
    vy: lv.weather === 'snow' ? 0.8 + Math.random()*1.2 : 1.5 + Math.random()*2,
    r:  lv.weather === 'snow' ? 1.5 + Math.random()*2 : 2 + Math.random()*3,
    a:  0.3 + Math.random()*0.5,
    type: lv.weather,
  });
}

function updateWeather() {
  const lv = LEVELS[lvlIdx];
  if(!lv.weather) { weather = []; return; }
  weather.forEach(p => { p.x += p.vx; p.y += p.vy; });
  weather = weather.filter(p => p.y < H + 20 && p.x > -20);
  while(weather.length < (lv.weather === 'snow' ? 60 : 30)) spawnWeatherPtcl(false);
}

function drawWeather() {
  weather.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.a;
    if(p.type === 'snow') {
      ctx.fillStyle = '#e8f4ff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
    } else {
      // Leaf
      ctx.fillStyle = '#a8783a';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r*1.5, p.r*0.7, frame*0.05, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

// ── LEVEL SYSTEM ─────────────────────────────────────────────────────────────
function updateLevel() {
  const pips = document.querySelectorAll('.pip');
  for(let i = LEVELS.length-1; i >= 0; i--) {
    if(score >= LEVELS[i].threshold) {
      if(i !== lvlIdx) {
        lvlIdx = i;
        initWeather();
        // Refresh building colours
        buildings.forEach(b => {
          const lv = LEVELS[lvlIdx];
          b.col = lv.bld[Math.floor(Math.random() * lv.bld.length)];
        });
      }
      pips.forEach((p,j) => p.classList.toggle('on', j === i));
      return;
    }
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GH = CFG.groundH;
}

function reset() {
  score = 0; frame = 0;
  speed = CFG.baseSpeed;
  lvlIdx = 0;
  obs = [];
  lastSpawn = 0;
  document.getElementById('sv').textContent = 0;
  document.getElementById('fs').textContent = 0;
  document.querySelectorAll('.pip').forEach((p,i) => p.classList.toggle('on', i===0));
  player.reset();
  initBuildings();
  initWeather();
}

function loop(ts) {
  requestAnimationFrame(loop);

  if(state !== 'play') return;

  frame++;
  speed += CFG.speedInc;

  // Spawn
  if(ts - lastSpawn > CFG.spawnMs - Math.min(300, score*2)) {
    spawnObs();
    lastSpawn = ts;
  }

  ctx.clearRect(0, 0, W, H);

  drawBackground();
  drawWeather();
  updateWeather();
  drawObs();
  updateObs();
  player.update();
  player.draw(lvlIdx);

  // Collision
  if(checkCollisions()) {
    state = 'dead';
    document.getElementById('fs').textContent = score;
    document.getElementById('over').classList.add('in');
    document.getElementById('score').style.opacity = '0';
  }
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
function onInput() {
  if(state === 'start') {
    document.getElementById('start').classList.add('out');
    document.getElementById('score').style.opacity = '1';
    setTimeout(() => {
      document.getElementById('start').style.display = 'none';
    }, 900);
    state = 'play';
    return;
  }
  if(state === 'play') {
    player.jump();
  }
}

document.getElementById('rbtn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('over').classList.remove('in');
  state = 'start';
  document.getElementById('start').style.display = 'flex';
  setTimeout(() => {
    document.getElementById('start').classList.remove('out');
    document.getElementById('start').style.opacity = '';
  }, 50);
  reset();
});

canvas.addEventListener('click',     onInput);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onInput(); }, {passive:false});
document.addEventListener('keydown',  e => { if(e.code==='Space'||e.code==='ArrowUp') onInput(); });

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resize);
resize();
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
