<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mode: Oli</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#f5f0e8;font-family:'Montserrat',sans-serif;overflow:hidden}
    body{display:flex;align-items:center;justify-content:center}
    #splash{text-align:center;padding:2rem;max-width:560px;width:100%;animation:fadeIn 0.6s ease both}
    .eyebrow{font-size:.58rem;font-weight:300;letter-spacing:.55em;text-transform:uppercase;color:#b0a090;margin-bottom:1.2rem}
    .main-title{font-family:'Cormorant Garamond',serif;font-weight:300;line-height:0.9;margin-bottom:2rem}
    .main-title .mode{display:block;font-size:clamp(1.2rem,3vw,2rem);font-style:normal;letter-spacing:.3em;text-transform:uppercase;color:#8a7a60;margin-bottom:.2rem}
    .main-title .name{display:block;font-size:clamp(5rem,18vw,10rem);font-style:italic;color:#1a1710;letter-spacing:-.02em}
    .divider{width:40px;height:1px;background:#c8a96e;margin:0 auto 2rem;opacity:.6}
    .instructions{margin-bottom:2.5rem}
    .instructions p{font-size:.6rem;font-weight:300;letter-spacing:.25em;text-transform:uppercase;color:#8a8070;margin-bottom:.7rem}
    .key{display:inline-block;background:rgba(200,169,110,.12);border:1px solid rgba(200,169,110,.35);color:#7a6040;padding:.15rem .55rem;font-size:.56rem;letter-spacing:.08em;border-radius:2px}
    .play-btn{display:inline-block;padding:1.1rem 4rem;background:#1a1710;color:#f5f0e8;font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:300;letter-spacing:.4em;text-transform:uppercase;cursor:pointer;border:none;transition:all .3s ease}
    .play-btn:hover{background:#c8a96e;color:#1a1710;letter-spacing:.45em}
    .back{display:block;margin-top:1.8rem;font-size:.5rem;font-weight:300;letter-spacing:.35em;text-transform:uppercase;color:#c0b8a8;text-decoration:none;transition:color .3s}
    .back:hover{color:#8a7a60}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
  <div id="splash">
    <p class="eyebrow">Donoghue.co</p>
    <h1 class="main-title">
      <span class="mode">Mode</span>
      <span class="name">Oli</span>
    </h1>
    <div class="divider"></div>
    <div class="instructions">
      <p><span class="key">Tap</span> or <span class="key">Space</span> &nbsp;to jump</p>
      <p><span class="key">Avoid</span> the obstacles &nbsp;&middot;&nbsp; <span class="key">Collect</span> the moments</p>
    </div>
    <button class="play-btn" id="playBtn">Play</button>
    <a href="https://donoghue.co" class="back">&larr; donoghue.co</a>
  </div>
  <script>
    document.getElementById('playBtn').addEventListener('click',function(){
      this.textContent='Loading…';
      this.disabled=true;
      // Game is embedded below after splash — just hide splash and show game
      document.getElementById('splash').style.display='none';
      document.getElementById('gameframe').style.display='block';
    });
  </script>
  <div id="gameframe" style="display:none;position:fixed;inset:0">
    <iframe src="https://olidonog.github.io/donoghue.co/game.html" style="width:100%;height:100%;border:none"></iframe>
  </div>
</body>
</html>
